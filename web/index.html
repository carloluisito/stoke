<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tokeff — token efficiency</title>
    <style>
      :root {
        /* dataviz reference palette — dark mode */
        --page: #0d0d0d;
        --surface: #1a1a19;
        --ink: #ffffff;
        --ink-2: #c3c2b7;
        --muted: #898781;
        --grid: #2c2c2a;
        --baseline: #383835;
        --border: rgba(255, 255, 255, 0.10);
        --s1: #3987e5; /* blue   — output $ */
        --s2: #199e70; /* aqua   — fresh input $ */
        --s3: #c98500; /* yellow — cache write $ */
        --s4: #008300; /* green  — cache read $ */
        --good: #0ca30c;
        --warning: #fab219;
        --serious: #ec835a;
        --critical: #d03b3b;
      }
      body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; background: var(--page); color: var(--ink); }
      * { box-sizing: border-box; }
      table { font-variant-numeric: tabular-nums; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
