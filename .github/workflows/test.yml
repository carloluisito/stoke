name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20.x, 22.x]
        exclude:
          # better-sqlite3 ships no win32 prebuild for current Node 20, and
          # Node 20's bundled node-gyp (v10) cannot detect the runner's
          # Visual Studio 2026 to compile from source. Windows is covered
          # on Node 22.
          - os: windows-latest
            node-version: 20.x

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Typecheck (proxy)
        run: npm run typecheck -w @stoke/proxy

      - name: Test (all workspaces)
        run: npm test

      - name: Build dashboard
        run: npm ci --prefix packages/monitor/web && npm run build --prefix packages/monitor/web
